<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thuy Universe</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

/* ===============================
GLOBAL STYLE
=============================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#050508;
color:white;
font-family:'Montserrat',sans-serif;

height:100vh;
overflow:hidden;

}

/* ===============================
STAR CANVAS
=============================== */

#universe{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;

}

/* ===============================
SCENE SYSTEM
=============================== */

.scene{

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

display:none;

align-items:center;
justify-content:center;

flex-direction:column;

text-align:center;

padding:20px;

z-index:10;

}

.scene.active{
display:flex;
}

/* ===============================
ROMANTIC TITLE
=============================== */

.title{

font-family:'Dancing Script',cursive;

font-size:4rem;

color:#ff4d6d;

margin-bottom:20px;

}

/* ===============================
GLASS CARD
=============================== */

.card{

background:rgba(255,255,255,0.05);

backdrop-filter:blur(10px);

padding:40px;

border-radius:20px;

max-width:600px;

width:90%;

border:1px solid rgba(255,255,255,0.2);

}

/* ===============================
BUTTON
=============================== */

.btn{

margin-top:25px;

padding:15px 30px;

border:none;

border-radius:50px;

font-size:1rem;

background:#ff4d6d;

color:white;

cursor:pointer;

transition:0.3s;

}

.btn:hover{

transform:scale(1.1);

background:#c9184a;

}

/* ===============================
MOBILE
=============================== */

@media(max-width:600px){

.title{
font-size:2.5rem;
}

.card{
padding:25px;
}

}

</style>
</head>


<body>

<canvas id="universe"></canvas>


<!-- ===============================
SCENE 1 INTRO
=============================== -->

<div class="scene active" id="scene1">

<h1 class="title">Hi Thùy</h1>

<div class="card">

<p>

Anh biết anh không thể ở bên cạnh em lúc này...

Nhưng anh đã mang cả vũ trụ này đến đây cho em.

</p>

<button class="btn" onclick="nextScene(1,2)">
Bắt đầu hành trình ✨
</button>

</div>

</div>


<!-- ===============================
SCENE 2
=============================== -->

<div class="scene" id="scene2">

<h1 class="title">Một điều bí mật</h1>

<div class="card">

<p>

Có vài điều anh đã giấu trong website này.

Nếu em tìm được hết...

có thể em sẽ biết anh thích em nhiều đến mức nào.

</p>

<button class="btn" onclick="alert('Module tiếp theo sẽ mở game ❤️')">
Khám phá tiếp
</button>

</div>

</div>


<script>

/* ===============================
SCENE CONTROLLER
=============================== */

function nextScene(from,to){

document.getElementById("scene"+from).classList.remove("active")

setTimeout(()=>{

document.getElementById("scene"+to).classList.add("active")

},400)

}


/* ===============================
STARFIELD ENGINE
=============================== */

const canvas=document.getElementById("universe")

const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let stars=[]

for(let i=0;i<300;i++){

stars.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

size:Math.random()*2,

speed:Math.random()*0.2

})

}


function animateStars(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

stars.forEach(star=>{

ctx.beginPath()

ctx.arc(star.x,star.y,star.size,0,Math.PI*2)

ctx.fill()

star.y+=star.speed

if(star.y>canvas.height){

star.y=0

}

})

requestAnimationFrame(animateStars)

}

animateStars()


/* ===============================
RESPONSIVE CANVAS
=============================== */

window.addEventListener("resize",()=>{

canvas.width=window.innerWidth
canvas.height=window.innerHeight

})

</script>


</body>
</html>
