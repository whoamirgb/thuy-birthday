<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thùy's Secret Universe | Eternal Magic 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=JetBrains+Mono:wght@300&family=Montserrat:wght@100;300;400;600;900&family=Pacifico&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
:root {
    --p: #ff4d6d;
    --p-l: #ff758f;
    --p-d: #c9184a;
    --s: #00f2ff;
    --s-d: #00b4d8;
    --bg: #030305;
    --paper: #fffef0;
    --envelope: #f34664;
    --gold: #ffb703;

    --f-hand: 'Dancing Script', cursive;
    --f-main: 'Montserrat', sans-serif;
    --f-code: 'JetBrains Mono', monospace;
    --f-logo: 'Pacifico', cursive;
    --f-serif: 'Playfair Display', serif;
}

*{margin:0;padding:0;box-sizing:border-box;cursor:none;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:#fff;font-family:var(--f-main);overflow:hidden;height:100vh;width:100vw;user-select:none;touch-action:none;}

#bg-canvas,#fire-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;}
#fire-canvas{z-index:5;pointer-events:none;}

#cursor{position:fixed;width:10px;height:10px;background:var(--p);border-radius:50%;pointer-events:none;z-index:10001;box-shadow:0 0 15px var(--p),0 0 30px var(--p-l);transition:transform 0.1s ease-out;}
#cursor-follower{position:fixed;width:30px;height:30px;border:1px solid var(--p-l);border-radius:50%;pointer-events:none;z-index:10000;transition:transform 0.2s ease-out;opacity:0.4;}

.glow-text{text-shadow:0 0 10px var(--p),0 0 20px var(--p-d);}
.floating-anim{animation:floating 3s infinite ease-in-out;}
@keyframes floating{0%,100%{transform:translateY(0) rotate(0);}50%{transform:translateY(-15px) rotate(2deg);}}

.btn-magic{position:relative;background:transparent;border:1px solid var(--p);color:var(--p);padding:15px 35px;border-radius:50px;font-family:var(--f-main);font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;overflow:hidden;transition:0.4s;z-index:100;}
.btn-magic:hover{background:var(--p);color:#fff;box-shadow:0 0 30px var(--p-d);transform:scale(1.05);}

/* LOCK SCREEN */
#lock-screen{position:fixed;inset:0;z-index:9999;background:radial-gradient(circle at center,#1a1a1a 0%,#000 100%);display:flex;flex-direction:column;justify-content:center;align-items:center;transition:transform 1.2s cubic-bezier(1,0,0,1),opacity 1s;}
.lock-card{position:relative;background:rgba(255,255,255,0.02);padding:70px 60px;border-radius:40px;backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,0.1);text-align:center;box-shadow:0 50px 100px rgba(0,0,0,0.9),inset 0 0 30px rgba(255,77,109,0.05);transform:perspective(1200px) rotateX(5deg);max-width:480px;width:90%;animation:lockCardFloat 5s infinite ease-in-out;overflow:hidden;}
.lock-card::before{content:'';position:absolute;top:0;left:-150%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.05),transparent);transform:skewX(-20deg);transition:0.8s;animation:shineSweep 4s infinite;}
@keyframes shineSweep{0%{left:-150%;}20%{left:150%;}100%{left:150%;}}
@keyframes lockCardFloat{0%,100%{transform:perspective(1200px) rotateX(5deg) translateY(0);}50%{transform:perspective(1200px) rotateX(10deg) translateY(-20px);}}
.lock-card h2{font-family:var(--f-code);font-size:0.8rem;letter-spacing:7px;color:var(--p);margin-bottom:15px;text-transform:uppercase;opacity:0.7;text-shadow:0 0 10px var(--p-d);}
.digital-clock{font-family:var(--f-code);font-size:4rem;color:var(--s);text-shadow:0 0 25px var(--s-d);margin-bottom:40px;font-weight:100;letter-spacing:-2px;}
.pass-input-container{position:relative;margin-bottom:30px;display:flex;flex-direction:column;align-items:center;}
#pass-input{background:transparent;border:none;border-bottom:2px solid rgba(255,255,255,0.15);color:#fff;font-size:3rem;width:260px;text-align:center;letter-spacing:18px;outline:none;font-family:var(--f-code);transition:all 0.5s cubic-bezier(0.175,0.885,0.32,1.275);padding-bottom:10px;}
#pass-input:focus{border-bottom-color:var(--p);width:300px;filter:drop-shadow(0 0 15px var(--p));}
#pass-input::placeholder{color:rgba(255,255,255,0.05);letter-spacing:5px;font-size:1.1rem;text-transform:uppercase;}
.hint-text-box{margin-top:20px;font-size:0.75rem;color:#666;font-family:var(--f-main);letter-spacing:1px;}
#error-msg{color:var(--p);font-family:var(--f-code);font-size:0.7rem;margin-top:15px;display:none;text-transform:uppercase;letter-spacing:2px;animation:fadeIn 0.3s;}
.shake-effect{animation:shakeInput 0.4s cubic-bezier(.36,.07,.19,.97) both;}
@keyframes shakeInput{10%,90%{transform:translate3d(-1px,0,0);}20%,80%{transform:translate3d(2px,0,0);}30%,50%,70%{transform:translate3d(-4px,0,0);}40%,60%{transform:translate3d(4px,0,0);}}

.scene{position:absolute;inset:0;display:none;opacity:0;flex-direction:column;align-items:center;justify-content:center;z-index:10;padding:50px;text-align:center;transition:all 1.2s cubic-bezier(0.4,0,0.2,1);perspective:2000px;}
.scene.active{display:flex;opacity:1;animation:sceneEnter 1.5s forwards;}
@keyframes sceneEnter{from{opacity:0;transform:scale(1.1) translateY(30px) rotateX(-5deg);filter:blur(15px);}to{opacity:1;transform:scale(1) translateY(0) rotateX(0);filter:blur(0);}}

.card-stage{width:340px;height:500px;margin:40px auto;position:relative;z-index:100;filter:drop-shadow(0 20px 50px rgba(0,0,0,0.8));}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 1.5s cubic-bezier(0.2,0.8,0.2,1);cursor:pointer;}
.card-inner.is-flipped{transform:rotateY(180deg) translateZ(50px);}
.card-side{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:25px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,0.08);overflow:hidden;}
.card-front{background:linear-gradient(145deg,#1a1a1c 0%,#050505 100%);color:var(--s);box-shadow:inset 0 0 50px rgba(0,242,255,0.05);}
.card-front::after{content:'♣︎';position:absolute;font-size:15rem;opacity:0.03;color:#fff;top:50%;left:50%;transform:translate(-50%,-50%);}
.card-icon-main{font-size:7rem;filter:drop-shadow(0 0 20px var(--s));margin-bottom:20px;animation:iconPulse 2s infinite ease-in-out;}
@keyframes iconPulse{0%,100%{transform:scale(1);filter:drop-shadow(0 0 20px var(--s));}50%{transform:scale(1.1);filter:drop-shadow(0 0 40px var(--s));}}
.card-back{background:var(--paper);color:#111;transform:rotateY(180deg);padding:40px;background-image:radial-gradient(circle at 50% 50%,rgba(0,0,0,0.02) 0%,transparent 80%);border:8px solid #fff;box-shadow:inset 0 0 100px rgba(0,0,0,0.05);}
.card-back-decoration{position:absolute;inset:15px;border:1px solid rgba(0,0,0,0.05);pointer-events:none;}
.reveal-text-title{font-family:var(--f-hand);font-size:2.5rem;color:var(--p-d);margin-bottom:15px;}
.reveal-text-desc{font-family:var(--f-main);font-size:1rem;line-height:1.6;font-weight:500;}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-follower"></div>

<canvas id="bg-canvas"></canvas>

<section id="lock-screen">
  <div class="lock-card">
    <h2>Hệ thống đã mã hóa</h2>
    <div class="digital-clock" id="clock">00:00:00</div>
    <div class="pass-input-container">
      <input type="password" id="pass-input" placeholder="MẬT MÃ" maxlength="6" autofocus autocomplete="off">
      <div id="error-msg">TRUY CẬP BỊ TỪ CHỐI - THỬ LẠI</div>
    </div>
    <div class="hint-text-box">
      <p>Gợi ý: <span style="color: var(--p);">Ngày Thùy sinh ra đời (DDMMYY)</span></p>
    </div>
  </div>
</section>

<section class="scene" id="scene-1">
  <h1 class="glow-text floating-anim" style="font-family:var(--f-logo);font-size:4.5rem;color:var(--p);margin-bottom:25px;">Hi Thùy!</h1>
  <div class="glass-card" style="border-left:4px solid var(--p);text-align:left;">
    <p id="typewriter-text" style="font-family:var(--f-main);font-size:1.25rem;line-height:2;color:#ececec;min-height:180px;"></p>
    <div style="margin-top:20px;font-family:var(--f-code);font-size:0.7rem;opacity:0.3;">CONNECTION_ID: #MARCH19_2009 | HEART_STATUS: STABLE</div>
  </div>
  <div id="btn-next-1-wrap" style="opacity:0;transform:translateY(20px);margin-top:40px;">
    <button class="btn-magic" onclick="changeScene(1,2)">Khám phá bí mật ✨</button>
  </div>
</section>

<!-- Các scene tiếp theo + envelope + card giữ nguyên concept, tui sẽ viết tiếp phần JS tối ưu -->

<script>
const state={isUnlocked:false,currentScene:0,typingSpeed:60,starsCount:200};
const cursor=document.getElementById('cursor'),follower=document.getElementById('cursor-follower');
let mX=0,mY=0,fX=0,fY=0;
window.addEventListener('mousemove',e=>{mX=e.clientX;mY=e.clientY;gsap.to(cursor,{x:mX,y:mY,duration:0.1});});
function updateFollower(){fX+=(mX-fX)*0.1;fY+=(mY-fY)*0.1;follower.style.transform=`translate(${fX-15}px,${fY-15}px)`;requestAnimationFrame(updateFollower);}updateFollower();

function initClock(){const c=document.getElementById('clock');setInterval(()=>{const n=new Date();c.innerText=`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;},1000);}initClock();

const passInput=document.getElementById('pass-input'),lockScreen=document.getElementById('lock-screen'),errorMsg=document.getElementById('error-msg');
passInput.addEventListener('input',(e)=>{const val=e.target.value;if(val.length===6){if(val==='190309'){handleUnlockSuccess();}else{handleUnlockFail();}}});
function handleUnlockFail(){passInput.classList.add('shake-effect');errorMsg.style.display='block';gsap.to(passInput,{color:'#ff4d6d',duration:0.2});setTimeout(()=>{passInput.classList.remove('shake-effect');passInput.value='';passInput.focus();gsap.to(passInput,{color:'#fff',duration:0.2});},500);}
function handleUnlockSuccess(){state.isUnlocked=true;gsap.to(lockScreen,{y:'-100%',duration:1.5,ease:"expo.inOut",onComplete:()=>{lockScreen.style.display='none';enterScene1();}});}

function changeScene(from,to){const f=document.getElementById(`scene-${from}`),t=document.getElementById(`scene-${to}`);
gsap.to(f,{opacity:0,y:-50,duration:1,onComplete:()=>{f.classList.remove('active');t.classList.add('active');gsap.fromTo(t,{opacity:0,y:50},{opacity:1,y:0,duration:1.2});}});}

function enterScene1(){const s1=document.getElementById('scene-1');s1.classList.add('active');const target=document.getElementById('typewriter-text');
const content="Chào Thùy, 19/03/2009. Anh là một sinh viên IT xa nhà, anh không có hoa hay quà trực tiếp để tặng em ngay lúc này... Vì thế, anh đã gửi gắm tất cả vào những dòng code này. Mỗi ngôi sao lấp lánh kia đều mang theo một lời chúc tốt đẹp nhất dành cho em. Hãy kiên nhẫn khám phá đến cuối cùng nhé, vì phép thuật thực sự vẫn đang chờ em phía trước...";
let i=0;function type(){if(i<content.length){target.innerHTML+=content.charAt(i);i++;const speed=[',','.','!'].includes(content[i-1])?500:Math.random()*50+30;setTimeout(type,speed);}else{gsap.to('#btn-next-1-wrap',{opacity:1,y:0,duration:1});}}setTimeout(type,1000);}

// Bắt đầu canvas stars tối ưu
const bgCanvas=document.getElementById('bg-canvas'),bCtx=bgCanvas.getContext('2d');
let stars=[],meteors=[];
function initUniverse(){bgCanvas.width=window.innerWidth;bgCanvas.height=window.innerHeight;stars=[];meteors=[];for(let i=0;i<state.starsCount;i++){stars.push({x:Math.random()*bgCanvas.width,y:Math.random()*bgCanvas.height,size:Math.random()*1.5+0.1,opacity:Math.random(),speedO:Math.random()*0.012+0.003,vx:Math.random()*0.25-0.125,vy:Math.random()*0.25-0.125,color:i%12===0?"255,77,109":"255,255,255",range:110});}}
initUniverse();

function createMeteor(){if(Math.random()<0.008 && state.isUnlocked){meteors.push({x:Math.random()*bgCanvas.width,y:0,len:Math.random()*70+30,speed:Math.random()*12+6,opacity:1});}}

function drawUniverse(){bCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);createMeteor();
for(let i
